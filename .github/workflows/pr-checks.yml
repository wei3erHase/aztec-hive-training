name: PR Checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    uses: defi-wonderland/aztec-ci-actions/.github/workflows/run-tests.yml@v0
    with:
      runner: ubuntu-latest
    secrets: inherit

  e2e:
    uses: ./.github/workflows/run-e2e.yml
    with:
      runner: ubuntu-latest
    secrets: inherit

  benchmark:
    uses: defi-wonderland/aztec-benchmark/.github/workflows/pr-benchmark.yml@8701b40bb8d42543696e3d2b07f4ccb2d2d3d830 # TODO: update to 4.1.0-rc.4 when released
    with:
      runner: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    secrets: inherit
