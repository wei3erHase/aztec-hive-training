name: Update Benchmark Baseline

on:
  push:
    branches:
      - dev
      - main
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

concurrency:
  group: update-baseline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  baseline:
    uses: defi-wonderland/aztec-benchmark/.github/workflows/update-baseline.yml@8701b40bb8d42543696e3d2b07f4ccb2d2d3d830 # TODO: update to 4.1.0-rc.4 when released
    permissions:
      contents: read
      actions: write
    secrets: inherit
