name: Run E2E Tests

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub runner label"
        type: string
        default: "ubuntu-latest"
      timeout:
        description: "Job timeout in minutes"
        type: number
        default: 120

jobs:
  e2e:
    name: E2E Tests
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Setup gaztec
        uses: nemi-fi/gaztec@v1.3.1

      - name: Build contract artifacts
        run: yarn build-contracts

      - name: Start Aztec local network
        run: |
          nohup npx gaztec start --local-network > /tmp/gaztec.log 2>&1 &

      - name: Wait for Aztec node
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8080/status >/dev/null || curl -fsS http://localhost:8080 >/dev/null; then
              echo "Aztec node is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Aztec node did not become ready in time"
          tail -n 200 /tmp/gaztec.log || true
          exit 1

      - name: Deploy contracts to local network
        run: VITE_PROVER_ENABLED=false yarn deploy-contracts:local-network

      - name: Build app
        run: yarn build-app:ci

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Run E2E tests
        run: yarn playwright test --project=chromium
