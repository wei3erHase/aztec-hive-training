name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: ${{ github.event_name == 'pull_request' && 'Preview' || (github.ref_name == 'main' && 'Production' || 'Preview') }}

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Error: VERCEL_TOKEN is not set. Please add this secret to your repository or environment."
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "Error: VERCEL_ORG_ID is not set. Please add this secret to your repository or environment."
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Error: VERCEL_PROJECT_ID is not set. Please add this secret to your repository or environment."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Setup gaztec
        uses: nemi-fi/gaztec@v1.3.1

      - name: Build contract artifacts
        run: yarn build-contracts

      - name: Build frontend
        run: yarn build-app:ci

      - name: Deploy to Vercel
        id: vercel-deployment
        uses: amondnet/vercel-action@v25.2.0
        with:
          github-token: ${{ github.event_name == 'pull_request' && secrets.GITHUB_TOKEN || '' }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID}}
          vercel-args: ${{ github.event_name == 'pull_request' && '' || (github.ref_name == 'main' && '--prod' || '') }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
